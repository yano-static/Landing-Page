<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yano · Dream Explorer</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="dream-page.css">
  <style>
    /* Basic interactive setup */
    area { cursor: pointer; }

    .map-container {
      max-width: 578px;
      margin: 0 auto 5rem;
      overflow: auto;
    }

    .interactive-collage {
      display: block;
      width: 578px;
      height: 768px;
      margin: 0 auto;
    }

    /* Footer/Navigation */
    .go-top {
      display: block;
      text-align: center;
      margin: 20px 0;
      color: var(--text-main);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="logo">Yano · <span>Archive</span></div>
    <nav class="nav">
      <a href="../index.html">Home</a>
      <a href="#dream-map">Interactive Map</a>
      <a href="bucketlist.html">Bucket List</a>
    </nav>
  </header>

  <main>
    <section class="post">
      <div class="post-label">Travel Goals</div>
      <h1 class="post-title">Dream <span>Places</span></h1>
      
      <div class="map-container" id="dream-map">
        <img src="map.png"
             usemap="#image-map"
             width="578"
             height="768"
             class="interactive-collage"
             alt="Dream Places Map">

        <map name="image-map">
          <!-- NYC -->
          <area target="_self" alt="Eagles" title="New York City, USA"
                href="place1.html"
                coords="185,532,209,577"
                shape="rect">

          <!-- Tokyo -->
          <area target="_self" alt="Guitar" title="Tokyo, Japan"
                href="place2.html"
                coords="17,341,19,362,22,376,24,393,23,412,24,432,29,509,37,508,39,491,42,508,42,515,40,533,44,552,50,581,42,597,34,601,19,604,14,586,11,566,15,531,7,514,6,490,10,470,18,490,21,491,17,457,16,424,13,402,10,391,9,371,9,353"
                shape="poly">

          <!-- Miyagi -->
          <area target="_self" alt="Volleyball Cat" title="Miyagi, Japan"
                href="place5.html"
                coords="408,509,34"
                shape="circle">

          <!-- Switzerland -->
          <area target="_self" alt="Cat" title="Mittelland, Switzerland"
                href="place4.html"
                coords="149,113,155,113,178,118,179,124,179,132,186,136,191,143,190,154,183,154,178,160,171,170,150,164,143,154,154,142,154,129"
                shape="poly">

          <!-- UK -->
          <area target="_self" alt="UK Flag" title="United Kingdom"
                href="place3.html"
                coords="285,607,290,602,299,586,307,586,317,595,322,604,324,625,325,635,324,649,321,655,316,655,311,664,307,676,303,680,299,673,292,670,284,666,286,656,289,642,287,630,286,618"
                shape="poly">
        </map>
      </div>
      
      <a href="#top" class="go-top">Go to top</a>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Yano · Archive</p>
  </footer>
</body>
</html>
