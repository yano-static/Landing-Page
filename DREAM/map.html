<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yano · Dream Explorer</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="dream-page.css">
  <style>
    /* Basic interactive setup */
    area { cursor: pointer; }

    .map-container {
      max-width: 900px;
      margin: 0 auto 5rem;
      overflow: auto;
    }

    .interactive-collage {
      display: block;
      width: 900px;
      height: 506px;
      margin: 0 auto;
    }

    /* Footer/Navigation */
    .go-top {
      display: block;
      text-align: center;
      margin: 20px 0;
      color: var(--text-main);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="logo">Yano · <span>Archive</span></div>
    <nav class="nav">
      <a href="../index.html">Home</a>
      <a href="#dream-map">Interactive Map</a>
      <a href="bucketlist.html">Bucket List</a>
    </nav>
  </header>

  <main>
    <section class="post">
      <div class="post-label">Travel Goals</div>
      <h1 class="post-title">Dream <span>Places</span></h1>
      
      <div class="map-container" id="dream-map">
        <img src="map.png"
             usemap="#image-map"
             width="900"
             height="506"
             class="interactive-collage"
             alt="Dream Places Map">

        <map name="image-map">
          <!-- NYC (rect) -->
          <area target="_self" alt="Eagles" title="New York City, USA"
                href="place1.html"
                coords="289,351,326,374"
                shape="rect">

          <!-- Tokyo (poly) -->
          <area target="_self" alt="Guitar" title="Tokyo, Japan"
                href="place2.html"
                coords="
                  26,225,28,239,31,248,34,259,33,272,34,285,
                  40,334,48,333,51,322,55,333,55,338,52,350,
                  57,364,63,383,57,393,49,396,28,398,23,386,
                  20,373,25,352,12,338,11,323,16,308,27,323,
                  29,324,26,301,25,279,21,265,18,258,16,245,16,233"
                shape="poly">

          <!-- Miyagi (circle) -->
          <area target="_self" alt="Volleyball Cat" title="Miyagi, Japan"
                href="place5.html"
                coords="465,334,52"
                shape="circle">

          <!-- Switzerland (poly) -->
          <area target="_self" alt="Cat" title="Mittelland, Switzerland"
                href="place4.html"
                coords="
                  219,75,224,75,238,79,244,84,241,90,
                  250,93,259,98,257,106,246,106,238,110,
                  232,117,219,113,213,106,223,98,223,89"
                shape="poly">

          <!-- UK (poly) -->
          <area target="_self" alt="UK Flag" title="United Kingdom"
                href="place3.html"
                coords="
                  437,401,443,397,455,387,467,387,482,393,
                  491,400,494,415,496,421,494,431,491,435,
                  485,435,479,441,474,450,470,453,465,449,
                  458,446,446,444,448,437,452,428,450,420,449,411"
                shape="poly">
        </map>
      </div>
      
      <a href="#top" class="go-top">Go to top</a>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Yano · Archive</p>
  </footer>
</body>
</html>
